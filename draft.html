<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Masters Draft Board</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
  .page{max-width:1100px;margin:0 auto;padding:20px 16px}

  /* Header */
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .title{font-size:24px;font-weight:600;color:#1a1a1a}
  .title span{color:#1a5c2e}
  .subtitle{font-size:13px;color:#888;margin-top:3px}
  .header-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .btn{padding:8px 16px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#555;cursor:pointer;transition:all 0.15s}
  .btn:hover{background:#f0f0ee;border-color:#aaa}
  .btn-green{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
  .btn-green:hover{background:#174f27}
  .btn-red{background:#c0392b;color:#fff;border-color:#c0392b}
  .btn-red:hover{background:#a93226}

  /* Status */
  .status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;margin-bottom:16px;padding:9px 14px;background:#fff;border-radius:8px;border:1px solid #eee}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .dot.live{background:#27ae60}
  .dot.warn{background:#e67e22}
  .dot.off{background:#ccc}

  /* Clock banner */
  .clock{background:#1a5c2e;color:#fff;border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .clock-name{font-size:20px;font-weight:600}
  .clock-meta{font-size:13px;opacity:0.8;margin-top:2px}
  .clock-next{font-size:13px;background:rgba(255,255,255,0.15);padding:5px 14px;border-radius:20px}
  .clock.done{background:#2c7873}

  /* Layout */
  .layout{display:grid;grid-template-columns:1fr 300px;gap:16px}
  @media(max-width:720px){.layout{grid-template-columns:1fr}}

  /* Board */
  .board{background:#fff;border-radius:12px;border:1px solid #eee;overflow:hidden}
  .board-head{display:grid;grid-template-columns:22px 110px 1fr 1fr 1fr;gap:6px;padding:10px 14px;background:#f9f9f7;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid #eee}
  .board-row{display:grid;grid-template-columns:22px 110px 1fr 1fr 1fr;gap:6px;padding:10px 14px;border-top:1px solid #f5f5f3;align-items:center;font-size:13px;transition:background 0.1s}
  .board-row.on-clock{background:#f0f8f3}
  .board-row:hover{background:#fafaf8}
  .pick-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .player-name{font-weight:600}
  .pick-cell{color:#1a1a1a}
  .pick-empty{color:#ccc;font-style:italic;font-size:12px}
  .pick-clock{color:#1a5c2e;font-weight:600;font-size:12px}

  /* Right column */
  .right{display:flex;flex-direction:column;gap:14px}
  .card{background:#fff;border-radius:12px;border:1px solid #eee;overflow:hidden}
  .card-head{padding:10px 14px;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.4px;background:#f9f9f7;border-bottom:1px solid #eee}
  .search{width:100%;padding:9px 14px;border:none;border-bottom:1px solid #eee;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
  .search:focus{background:#fafaf8}
  .selected-bar{padding:10px 14px;font-size:13px;border-bottom:1px solid #eee;min-height:40px;display:flex;align-items:center}
  .selected-bar.has-pick{color:#1a5c2e;font-weight:600}
  .selected-bar.no-pick{color:#bbb}
  .golfer-list{max-height:260px;overflow-y:auto}
  .golfer-row{padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #f5f5f3;transition:background 0.1s}
  .golfer-row:first-child{border-top:none}
  .golfer-row:hover:not(.taken){background:#f0f8f3}
  .golfer-row.taken{color:#ccc;cursor:default}
  .golfer-row.selected-row{background:#e8f5ee}
  .golfer-odds{font-size:11px;color:#bbb}
  .draft-btn{width:100%;padding:11px;font-size:13px;font-weight:600;cursor:pointer;border:none;border-top:1px solid #eee;transition:all 0.15s}
  .draft-btn.ready{background:#1a5c2e;color:#fff}
  .draft-btn.ready:hover{background:#174f27}
  .draft-btn.disabled{background:#f5f5f3;color:#bbb;cursor:default}

  /* Rosters */
  .roster-row{padding:9px 14px;border-top:1px solid #f5f5f3;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .roster-row:first-child{border-top:none}
  .roster-name{font-size:13px;font-weight:600;min-width:70px}
  .roster-picks{font-size:11px;color:#888;flex:1}
  .roster-count{font-size:11px;color:#bbb;white-space:nowrap}

  /* Complete */
  .complete-box{background:#f0f8f3;border:1px solid #a8d5b5;border-radius:10px;padding:20px;text-align:center;margin-bottom:20px}
  .complete-box h2{font-size:18px;color:#1a5c2e;margin-bottom:6px}
  .complete-box p{font-size:13px;color:#555}

  /* Sync indicator */
  .spin{display:inline-block}
  .spin.go{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Admin bar */
  .admin-bar{display:flex;gap:8px;margin-bottom:16px;padding:12px 14px;background:#fff;border-radius:10px;border:1px solid #eee;align-items:center;flex-wrap:wrap}
  .admin-label{font-size:12px;color:#888;margin-right:4px}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <div class="title">2026 Masters <span>Draft Board</span></div>
      <div class="subtitle">Snake draft · 3 rounds · 9 players · Live sync</div>
    </div>
    <div class="header-right">
      <span class="spin" id="sync-spin" style="display:inline-block;color:#888;font-size:16px">↻</span>
      <button class="btn" onclick="loadPicks()">Refresh</button>
      <button class="btn btn-red" onclick="confirmClear()">Reset draft</button>
    </div>
  </div>

  <div class="status-bar">
    <span class="dot off" id="status-dot"></span>
    <span id="status-txt">Connecting to live sheet...</span>
  </div>

  <div id="complete-box" class="complete-box" style="display:none">
    <h2>Draft complete!</h2>
    <p>All 27 picks have been made. Good luck at Augusta!</p>
  </div>

  <div id="clock-banner" class="clock">
    <div>
      <div class="clock-name" id="clock-name">Loading...</div>
      <div class="clock-meta" id="clock-meta"></div>
    </div>
    <div class="clock-next" id="clock-next"></div>
  </div>

  <div class="layout">
    <div class="board">
      <div class="board-head">
        <span></span><span>Player</span><span>Round 1</span><span>Round 2</span><span>Round 3</span>
      </div>
      <div id="board-rows"></div>
    </div>

    <div class="right">
      <div class="card">
        <div class="card-head" id="pick-label">Make a pick</div>
        <input class="search" id="search" type="text" placeholder="Search golfer..." oninput="filterGolfers()" />
        <div class="selected-bar no-pick" id="selected-bar">No golfer selected</div>
        <div class="golfer-list" id="golfer-list"></div>
        <button class="draft-btn disabled" id="draft-btn" onclick="confirmPick()">Select a golfer to draft</button>
      </div>

      <div class="card">
        <div class="card-head">Rosters</div>
        <div id="roster-rows"></div>
      </div>
    </div>
  </div>

</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzaTb9krKVEbF-6PJ4uVRslFGNWu1qw7xXoIp79CJTU4OTLwzlWKiabKKGaTn176KgN/exec';
const TAB = 'Masters 26';

const PLAYERS = [
  {name:'Steve',   color:'#7a1a7a'},
  {name:'Austin',  color:'#1a5c4a'},
  {name:'Noah',    color:'#1a4a7a'},
  {name:'Tom',     color:'#1a3a5c'},
  {name:'Brian',   color:'#5a3a7a'},
  {name:'Jeremiah',color:'#8b2020'},
  {name:'Josh',    color:'#2d6a2d'},
  {name:'Bobby',   color:'#7a4a1a'},
  {name:'Ben',     color:'#7a6a1a'},
];

const GOLFERS = [
  {name:'Scottie Scheffler',odds:'400'},{name:'Rory McIlroy',odds:'600'},
  {name:'Jon Rahm',odds:'800'},{name:'Ludvig Åberg',odds:'900'},
  {name:'Xander Schauffele',odds:'1000'},{name:'Collin Morikawa',odds:'1200'},
  {name:'Bryson DeChambeau',odds:'1400'},{name:'Tommy Fleetwood',odds:'1600'},
  {name:'Viktor Hovland',odds:'1800'},{name:'Brooks Koepka',odds:'2000'},
  {name:'Patrick Cantlay',odds:'2200'},{name:'Justin Thomas',odds:'2500'},
  {name:'Hideki Matsuyama',odds:'2500'},{name:'Shane Lowry',odds:'2800'},
  {name:'Tyrrell Hatton',odds:'2800'},{name:'Robert MacIntyre',odds:'3000'},
  {name:'Jordan Spieth',odds:'3000'},{name:'Tony Finau',odds:'3500'},
  {name:'Sepp Straka',odds:'3500'},{name:'Corey Conners',odds:'4000'},
  {name:'Adam Scott',odds:'4000'},{name:'Justin Rose',odds:'4500'},
  {name:'Russell Henley',odds:'4500'},{name:'Keegan Bradley',odds:'5000'},
  {name:'Matt Fitzpatrick',odds:'5000'},{name:'Dustin Johnson',odds:'5500'},
  {name:'Jason Day',odds:'5500'},{name:'Patrick Reed',odds:'6000'},
  {name:'Sam Burns',odds:'6000'},{name:'Joaquin Niemann',odds:'6000'},
  {name:'Tom Kim',odds:'6500'},{name:'Harris English',odds:'7000'},
  {name:'Cameron Smith',odds:'7000'},{name:'Wyndham Clark',odds:'7000'},
  {name:'Akshay Bhatia',odds:'7500'},{name:'Min Woo Lee',odds:'8000'},
  {name:'Aaron Rai',odds:'8000'},{name:'Maverick McNealy',odds:'8000'},
  {name:'Daniel Berger',odds:'8000'},{name:'Ben Griffin',odds:'8000'},
  {name:'Phil Mickelson',odds:'10000'},{name:'Will Zalatoris',odds:'10000'},
  {name:'Cameron Young',odds:'10000'},{name:'Sungjae Im',odds:'10000'},
  {name:'Sahith Theegala',odds:'11000'},{name:'Si Woo Kim',odds:'11000'},
  {name:'J.J. Spaun',odds:'12000'},{name:'Dustin Johnson',odds:'12000'},
];

function buildSnake(players, rounds) {
  const order = [];
  for (let r = 0; r < rounds; r++) {
    const row = r % 2 === 0 ? [...players] : [...players].reverse();
    row.forEach((p, i) => order.push({
      overall: r * players.length + i + 1,
      player: p.name,
      round: r + 1
    }));
  }
  return order;
}

const SNAKE = buildSnake(PLAYERS, 3);
let picks = [];
let selectedGolfer = null;
let pollTimer = null;

function taken() { return new Set(picks.map(p => p.golfer)); }
function isDone() { return picks.length >= SNAKE.length; }
function currentSlot() { return SNAKE[picks.length]; }

async function callAPI(params) {
  const url = API + '?' + new URLSearchParams({...params, tab: TAB, t: Date.now()});
  const res = await fetch(url);
  return res.json();
}

async function loadPicks() {
  const spin = document.getElementById('sync-spin');
  spin.classList.add('go');
  try {
    const d = await callAPI({action: 'read'});
    if (d.data) {
      picks = d.data
        .filter(r => r.overall && r.player && r.golfer)
        .map(r => ({overall: parseInt(r.overall), player: String(r.player), golfer: String(r.golfer)}))
        .sort((a, b) => a.overall - b.overall);
    }
    const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById('status-dot').className = 'dot live';
    document.getElementById('status-txt').textContent = 'Live · ' + picks.length + ' picks made · Updated ' + now;
  } catch(e) {
    document.getElementById('status-dot').className = 'dot off';
    document.getElementById('status-txt').textContent = 'Connection error — retrying...';
  }
  spin.classList.remove('go');
  render();
}

async function confirmPick() {
  if (!selectedGolfer || isDone()) return;
  const slot = currentSlot();
  const btn = document.getElementById('draft-btn');
  btn.textContent = 'Drafting...';
  btn.className = 'draft-btn disabled';
  try {
    await callAPI({action: 'addPick', overall: slot.overall, player: slot.player, golfer: encodeURIComponent(selectedGolfer)});
    selectedGolfer = null;
    document.getElementById('search').value = '';
    await loadPicks();
  } catch(e) {
    btn.textContent = 'Error — try again';
    btn.className = 'draft-btn ready';
  }
}

async function undoPick() {
  if (picks.length === 0) return;
  if (!confirm('Undo the last pick (' + picks[picks.length-1].golfer + ')?')) return;
  await callAPI({action: 'undoPick'});
  await loadPicks();
}

async function confirmClear() {
  if (!confirm('Reset the entire draft? This cannot be undone.')) return;
  await callAPI({action: 'clearAll'});
  picks = [];
  selectedGolfer = null;
  await loadPicks();
}

function render() {
  renderClock();
  renderBoard();
  renderGolferList();
  renderRosters();
}

function renderClock() {
  const banner = document.getElementById('clock-banner');
  const completeBox = document.getElementById('complete-box');
  if (isDone()) {
    banner.style.display = 'none';
    completeBox.style.display = '';
    document.getElementById('pick-label').textContent = 'Draft complete';
    document.getElementById('draft-btn').className = 'draft-btn disabled';
    document.getElementById('draft-btn').textContent = 'Draft is complete';
    return;
  }
  banner.style.display = '';
  completeBox.style.display = 'none';
  const slot = currentSlot();
  const next = SNAKE[picks.length + 1];
  const player = PLAYERS.find(p => p.name === slot.player);
  document.getElementById('clock-name').textContent = slot.player + ' is on the clock';
  document.getElementById('clock-meta').textContent = 'Pick ' + slot.overall + ' of ' + SNAKE.length + ' · Round ' + slot.round;
  document.getElementById('clock-next').textContent = next ? 'Up next: ' + next.player : 'Last pick!';
  document.getElementById('pick-label').textContent = 'Pick for ' + slot.player;
  if (player) banner.style.background = player.color;
}

function renderBoard() {
  document.getElementById('board-rows').innerHTML = PLAYERS.map(pl => {
    const slots = SNAKE.filter(s => s.player === pl.name);
    const cells = slots.map(slot => {
      const pick = picks.find(pk => pk.overall === slot.overall);
      const isClock = !isDone() && slot.overall === picks.length + 1;
      if (pick) return `<span class="pick-cell">${pick.golfer}</span>`;
      if (isClock) return `<span class="pick-clock">on the clock...</span>`;
      return `<span class="pick-empty">—</span>`;
    });
    const isClock = !isDone() && slots.some(s => s.overall === picks.length + 1);
    return `<div class="board-row${isClock ? ' on-clock' : ''}">
      <span><div class="pick-dot" style="background:${pl.color}"></div></span>
      <span class="player-name" style="color:${pl.color}">${pl.name}</span>
      ${cells.join('')}
    </div>`;
  }).join('');
}

function filterGolfers() { renderGolferList(); }

function renderGolferList() {
  const tk = taken();
  const q = document.getElementById('search').value.toLowerCase();
  const list = GOLFERS.filter(g => g.name.toLowerCase().includes(q));
  document.getElementById('golfer-list').innerHTML = list.map(g => {
    const isTaken = tk.has(g.name);
    const isSel = selectedGolfer === g.name;
    return `<div class="golfer-row${isTaken?' taken':''}${isSel?' selected-row':''}" onclick="${isTaken?'':'selectGolfer(\''+g.name.replace(/'/g,"\\'")+'\')'} ">
      <span>${g.name}</span>
      <span class="golfer-odds">${isTaken ? 'taken' : g.odds}</span>
    </div>`;
  }).join('');
}

function selectGolfer(name) {
  if (taken().has(name) || isDone()) return;
  selectedGolfer = name;
  const bar = document.getElementById('selected-bar');
  bar.textContent = name + ' selected';
  bar.className = 'selected-bar has-pick';
  const btn = document.getElementById('draft-btn');
  const slot = currentSlot();
  btn.textContent = 'Draft ' + name + ' for ' + slot.player;
  btn.className = 'draft-btn ready';
  renderGolferList();
}

function renderRosters() {
  document.getElementById('roster-rows').innerHTML = PLAYERS.map(pl => {
    const myPicks = picks.filter(p => p.player === pl.name).map(p => p.golfer);
    return `<div class="roster-row">
      <div class="roster-name" style="color:${pl.color}">${pl.name}</div>
      <div class="roster-picks">${myPicks.length ? myPicks.join(', ') : 'No picks yet'}</div>
      <div class="roster-count">${myPicks.length}/3</div>
    </div>`;
  }).join('');
}

pollTimer = setInterval(loadPicks, 10000);
loadPicks();
</script>
</body>
</html>

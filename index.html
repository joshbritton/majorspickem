<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 Majors Pick 'Em</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
  a{color:inherit;text-decoration:none}

  /* Layout */
  .page{max-width:1200px;margin:0 auto;padding:24px 16px}

  /* Header */
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .header-left{}
  .title{font-size:26px;font-weight:600;color:#1a1a1a;letter-spacing:-0.3px}
  .title span{color:#1a5c2e}
  .tagline{font-size:13px;color:#666;margin-top:3px}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  /* Controls */
  select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;cursor:pointer;outline:none}
  select:hover{border-color:#aaa}
  .btn{padding:8px 16px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#555;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
  .btn:hover{background:#f0f0ee;border-color:#aaa}
  .btn:active{transform:scale(0.98)}
  .btn-primary{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
  .btn-primary:hover{background:#174f27;border-color:#174f27}

  /* Status bar */
  .status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;margin-bottom:16px;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid #eee}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot.live{background:#27ae60;box-shadow:0 0 0 3px #27ae6020}
  .dot.warn{background:#e67e22}
  .dot.off{background:#ccc}

  /* Metric cards */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
  .metric{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #eee}
  .metric-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px}
  .metric-val{font-size:22px;font-weight:600;color:#1a1a1a}
  .metric-sub{font-size:12px;color:#888;margin-top:2px}

  /* View tabs */
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:#fff;padding:4px;border-radius:10px;border:1px solid #eee;width:fit-content;flex-wrap:wrap}
  .tab{padding:7px 18px;border-radius:7px;font-size:13px;cursor:pointer;color:#666;border:none;background:transparent;transition:all 0.15s;white-space:nowrap}
  .tab.active{background:#1a5c2e;color:#fff;font-weight:500}
  .tab:hover:not(.active){background:#f0f0ee;color:#1a1a1a}

  /* Team cards */
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:#fff;border-radius:12px;border:1px solid #eee;overflow:hidden;transition:box-shadow 0.15s}
  .card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
  .card-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0ee}
  .card-left{display:flex;align-items:center;gap:10px}
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
  .owner-name{font-size:15px;font-weight:600;color:#1a1a1a}
  .owner-earn{font-size:12px;color:#888;margin-top:1px}
  .card-right{display:flex;align-items:center;gap:8px}
  .rank-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
  .team-total{font-size:15px;font-weight:600}

  /* Pick rows */
  .pick-row{display:grid;grid-template-columns:20px 1fr 38px 44px 74px;align-items:center;gap:4px;padding:8px 16px;border-top:1px solid #f7f7f5;font-size:13px}
  .pick-num{font-size:11px;color:#bbb;font-weight:500}
  .pick-name{color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pick-name.mc{text-decoration:line-through;color:#bbb}
  .pick-pos{font-size:12px;color:#888;text-align:right}
  .pick-score{font-size:13px;font-weight:600;text-align:right}
  .pick-earn{font-size:11px;color:#888;text-align:right}

  /* Score colors */
  .red{color:#c0392b}
  .green{color:#27ae60}
  .even{color:#888}

  /* Leaderboard / standings */
  .table-wrap{background:#fff;border-radius:12px;border:1px solid #eee;overflow:hidden}
  .lb-head{display:grid;gap:4px;padding:10px 16px;background:#f9f9f7;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid #eee}
  .lb-row{display:grid;gap:4px;padding:10px 16px;border-top:1px solid #f7f7f5;font-size:13px;align-items:center}
  .lb-row:hover{background:#fafaf8}
  .lb-name{font-weight:500;color:#1a1a1a}
  .lb-sub{font-size:11px;color:#aaa;margin-top:1px}
  .lb-pos{color:#888;font-size:12px}

  /* Field leaderboard columns */
  .field-grid{grid-template-columns:36px 1fr 50px 55px 60px 90px}
  .ta-c{text-align:center}
  .ta-r{text-align:right}

  /* Standings columns */
  .standings-grid{grid-template-columns:36px 160px 1fr 70px 100px}

  /* Tee times */
  .tee-grid{grid-template-columns:1fr 110px 160px}

  /* Picked highlight */
  .picked-row{background:#f0f8f3}
  .pick-tag{display:inline-flex;align-items:center;padding:2px 8px;background:#e0f0e8;color:#1a5c2e;border-radius:20px;font-size:10px;font-weight:600;margin-left:6px}

  /* Empty state */
  .empty{padding:32px 16px;text-align:center;color:#aaa;font-size:14px}

  /* Auto-refresh indicator */
  .spinning{animation:spin 1s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Footer */
  .footer{margin-top:32px;text-align:center;font-size:12px;color:#bbb;padding-bottom:24px}

  /* Responsive */
  @media(max-width:600px){
    .title{font-size:20px}
    .teams-grid{grid-template-columns:1fr}
    .standings-grid{grid-template-columns:28px 120px 1fr 60px 80px}
    .field-grid{grid-template-columns:30px 1fr 40px 45px 50px 70px}
    .metrics{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <div class="title">2025 Majors <span>Pick 'Em</span></div>
      <div class="tagline" id="tagline">Loading tournament data...</div>
    </div>
    <div class="header-right">
      <select id="t-select" onchange="switchTournament(this.value)">
        <option value="masters">Masters 2025</option>
        <option value="pga">PGA Championship 2025</option>
        <option value="usopen" selected>US Open 2025</option>
        <option value="open">The Open 2025</option>
      </select>
      <button class="btn btn-primary" onclick="refresh()">
        <span id="spin" style="display:inline-block">↻</span> Refresh
      </button>
    </div>
  </div>

  <div class="status-bar">
    <span class="dot off" id="status-dot"></span>
    <span id="status-txt">Connecting to live data...</span>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="tabs">
    <button class="tab active" onclick="setView('teams',this)">Teams</button>
    <button class="tab" onclick="setView('standings',this)">Standings</button>
    <button class="tab" onclick="setView('field',this)">Field leaderboard</button>
    <button class="tab" onclick="setView('teetimes',this)">Tee times</button>
  </div>

  <div id="view-teams"><div class="teams-grid" id="teams-grid"></div></div>

  <div id="view-standings" style="display:none">
    <div class="table-wrap">
      <div class="lb-head standings-grid lb-head">
        <span>#</span><span>Player</span><span>Picks</span><span>Score</span><span style="text-align:right">Earnings</span>
      </div>
      <div id="standings-rows"></div>
    </div>
  </div>

  <div id="view-field" style="display:none">
    <div class="table-wrap">
      <div class="lb-head field-grid">
        <span>Pos</span><span>Golfer</span><span class="ta-c">Thru</span><span class="ta-c">Today</span><span class="ta-r">Total</span><span class="ta-r">Earnings</span>
      </div>
      <div id="field-rows"></div>
    </div>
  </div>

  <div id="view-teetimes" style="display:none">
    <div class="table-wrap">
      <div class="lb-head tee-grid">
        <span>Player</span><span>Tee time</span><span>Owned by</span>
      </div>
      <div id="tee-rows"></div>
    </div>
  </div>

  <div class="footer">Updated automatically every 60 seconds &middot; Data from your Google Sheet</div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx6K5iGgN9tcgayAvgqpfKqubtK3MLBqpPLtrjwCjVI31xYHdAbNXvAUNgsJuyV39vf/exec';

const TEAMS = {
  usopen:[
    {name:'Tom',   color:'#1a3a5c', picks:['Scottie Scheffler','Harris English','Tony Finau','Tom Kim']},
    {name:'Josh',  color:'#2d6a2d', picks:['Bryson DeChambeau','Ben Griffin','Corey Conners','Tyrrell Hatton']},
    {name:'Bobby', color:'#6b2020', picks:['Rory McIlroy','Patrick Cantlay','Robert MacIntyre','Patrick Reed']},
    {name:'Brian', color:'#5a3a7a', picks:['Jon Rahm','Tommy Fleetwood','Justin Rose','Daniel Berger']},
    {name:'Austin',color:'#1a5c4a', picks:['Xander Schauffele','Brooks Koepka','Jordan Spieth','Phil Mickelson']},
    {name:'Ben',   color:'#7a5a1a', picks:['Ludvig Åberg','Justin Thomas','Matt Fitzpatrick','Dustin Johnson']},
    {name:'Noah',  color:'#1a4a7a', picks:['Joaquin Niemann','Sam Burns','Sepp Straka','Akshay Bhatia']},
    {name:'Steve', color:'#5a1a5a', picks:['Collin Morikawa','Viktor Hovland','Jason Day','Adam Scott']},
    {name:'Miah',  color:'#2a5a2a', picks:['Shane Lowry','Hideki Matsuyama','Aaron Rai','Keegan Bradley']},
  ],
  masters:[
    {name:'Jeremiah',color:'#1a3a5c', picks:['Scottie Scheffler','Jason Day','Tom Kim','Adam Scott']},
    {name:'Brian',   color:'#6b2020', picks:['Rory McIlroy','Tommy Fleetwood','Justin Rose','Corey Conners']},
    {name:'Austin',  color:'#2d6a2d', picks:['Bryson DeChambeau','Jordan Spieth','Tony Finau','Shane Lowry']},
    {name:'Tom',     color:'#5a3a7a', picks:['Collin Morikawa','Hideki Matsuyama','Viktor Hovland','Phil Mickelson']},
    {name:'Josh',    color:'#1a5c4a', picks:['Ludvig Åberg','Justin Thomas','Will Zalatoris','Patrick Reed']},
    {name:'Ben',     color:'#7a5a1a', picks:['Brooks Koepka','Justin Thomas','Dustin Johnson','Keegan Bradley']},
    {name:'Bobby',   color:'#1a4a7a', picks:['Jon Rahm','Wyndham Clark','Robert MacIntyre','Sahith Theegala']},
    {name:'Noah',    color:'#5a1a5a', picks:['Xander Schauffele','Justin Rose','Russell Henley','Sepp Straka']},
    {name:'Steve',   color:'#2a5a2a', picks:['Joaquin Niemann','Sam Burns','Cameron Smith','']},
  ],
  pga:[
    {name:'Bobby',   color:'#1a3a5c', picks:['Scottie Scheffler','Patrick Cantlay','Wyndham Clark','']},
    {name:'Jeremiah',color:'#2d6a2d', picks:['Rory McIlroy','Joaquin Niemann','Corey Conners','']},
    {name:'Steve',   color:'#6b2020', picks:['Jon Rahm','Cameron Smith','Sam Burns','']},
    {name:'Austin',  color:'#5a3a7a', picks:['Bryson DeChambeau','Shane Lowry','Sepp Straka','']},
    {name:'Ben',     color:'#1a5c4a', picks:['Robert MacIntyre','Matt Fitzpatrick','Brooks Koepka','']},
    {name:'Noah',    color:'#7a5a1a', picks:['Xander Schauffele','Tom Kim','Keegan Bradley','']},
    {name:'Brian',   color:'#1a4a7a', picks:['Ludvig Åberg','Tyrrell Hatton','Maverick McNealy','']},
    {name:'Tom',     color:'#5a1a5a', picks:['Collin Morikawa','Justin Rose','Jason Day','']},
    {name:'Josh',    color:'#2a5a2a', picks:['Justin Thomas','Russell Henley','','']},
  ],
  open:[
    {name:'Bobby',   color:'#1a3a5c', picks:['Scottie Scheffler','Patrick Cantlay','Wyndham Clark','']},
    {name:'Jeremiah',color:'#2d6a2d', picks:['Rory McIlroy','Joaquin Niemann','Corey Conners','']},
    {name:'Steve',   color:'#6b2020', picks:['Jon Rahm','Cameron Smith','Sam Burns','']},
    {name:'Austin',  color:'#5a3a7a', picks:['Bryson DeChambeau','Shane Lowry','Sepp Straka','']},
    {name:'Ben',     color:'#1a5c4a', picks:['Robert MacIntyre','Matt Fitzpatrick','Brooks Koepka','']},
    {name:'Noah',    color:'#7a5a1a', picks:['Xander Schauffele','Tom Kim','Keegan Bradley','']},
    {name:'Brian',   color:'#1a4a7a', picks:['Ludvig Åberg','Tyrrell Hatton','Maverick McNealy','']},
    {name:'Tom',     color:'#5a1a5a', picks:['Collin Morikawa','Justin Rose','Jason Day','']},
    {name:'Josh',    color:'#2a5a2a', picks:['Rory McIlroy','Justin Thomas','Russell Henley','']},
  ]
};

const T_NAMES = {
  masters:'Masters 2025',
  pga:'PGA Championship 2025',
  usopen:'US Open 2025',
  open:'The Open Championship 2025'
};

const RANK_COLORS = ['#b8860b','#888','#7a5c2e','#4a7a9b','#6a4a8a','#4a8a6a','#8a6a4a','#4a4a8a','#8a4a4a'];

let currentT = 'usopen';
let scoreMap = {};
let rawData = [];
let dataMode = 'none';
let currentView = 'teams';

/* ---- Formatting helpers ---- */
function fmtScore(s) {
  if (s === null || s === undefined || s === '') return '—';
  const n = parseInt(s);
  if (isNaN(n)) return String(s);
  if (n === 0) return 'E';
  return n > 0 ? '+' + n : '' + n;
}
function scoreClass(s) {
  const n = parseInt(s);
  if (isNaN(n)) return 'even';
  return n < 0 ? 'red' : n > 0 ? 'green' : 'even';
}
function fmtMoney(n) {
  if (!n || n === 0) return '—';
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + Math.round(n / 1000) + 'K';
  return '$' + n;
}
function fmtTime(v) {
  if (!v) return '—';
  if (typeof v === 'string' && v.includes(':')) return v;
  try {
    const d = new Date(v);
    if (isNaN(d)) return String(v);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return String(v); }
}
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

/* ---- Data detection ---- */
function detectMode(rows) {
  if (!rows || rows.length === 0) return 'none';
  const keys = Object.keys(rows[0]).map(k => k.toUpperCase());
  if (keys.some(k => k.includes('SCORE') || k.includes('TOTAL') || k.includes('POS'))) return 'scores';
  if (keys.some(k => k.includes('TEE') || k.includes('TIME'))) return 'teetimes';
  return 'unknown';
}

function parseScores(rows) {
  const map = {};
  rows.forEach(r => {
    const keys = Object.keys(r);
    const nameKey  = keys.find(k => /PLAYER|GOLFER|NAME/i.test(k)) || keys[0];
    const posKey   = keys.find(k => /^POS/i.test(k));
    const scoreKey = keys.find(k => /TOTAL|^SCORE/i.test(k));
    const todayKey = keys.find(k => /TODAY|^RD|^R\d/i.test(k));
    const thruKey  = keys.find(k => /THRU/i.test(k));
    const earnKey  = keys.find(k => /EARN|MONEY|PRIZE/i.test(k));
    const name = r[nameKey];
    if (!name) return;
    const pos = posKey ? r[posKey] : '';
    const isMC = pos && String(pos).toUpperCase() === 'MC';
    map[String(name).trim()] = {
      name: String(name).trim(),
      pos: pos || 'TBD',
      score: scoreKey ? r[scoreKey] : 0,
      today: todayKey ? r[todayKey] : 0,
      thru: thruKey ? r[thruKey] : '',
      earnings: earnKey ? parseFloat(r[earnKey]) || 0 : 0,
      madeCut: !isMC
    };
  });
  return map;
}

function getPlayer(name) {
  return scoreMap[name] || { name, pos: 'TBD', score: 0, today: 0, thru: '—', earnings: 0, madeCut: true };
}

/* ---- Data fetch ---- */
async function fetchData() {
  const spinEl = document.getElementById('spin');
  spinEl.classList.add('spinning');
  document.getElementById('status-dot').className = 'dot warn';
  document.getElementById('status-txt').textContent = 'Fetching live data...';
  try {
    const res = await fetch(API + '?t=' + Date.now());
    const json = await res.json();
    rawData = json.data || [];
    dataMode = detectMode(rawData);
    if (dataMode === 'scores') scoreMap = parseScores(rawData);
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('status-dot').className = 'dot live';
    document.getElementById('status-txt').textContent =
      T_NAMES[currentT] + ' · ' + (dataMode === 'scores' ? 'Live scores' : dataMode === 'teetimes' ? 'Tee times loaded' : 'Data loaded') + ' · Updated ' + now;
    document.getElementById('tagline').textContent = T_NAMES[currentT];
  } catch(e) {
    document.getElementById('status-dot').className = 'dot off';
    document.getElementById('status-txt').textContent = 'Could not reach live data — check your connection';
  }
  spinEl.classList.remove('spinning');
  renderAll();
}

function refresh() { fetchData(); }

function switchTournament(t) {
  currentT = t;
  document.getElementById('tagline').textContent = T_NAMES[t];
  renderAll();
}

function setView(v, btn) {
  currentView = v;
  ['teams', 'standings', 'field', 'teetimes'].forEach(x => {
    document.getElementById('view-' + x).style.display = x === v ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

/* ---- Team helpers ---- */
function teamEarnings(team) {
  return team.picks.filter(Boolean).reduce((s, p) => s + (getPlayer(p).earnings || 0), 0);
}
function teamScore(team) {
  return team.picks.filter(Boolean).reduce((s, p) => {
    const pl = getPlayer(p);
    return s + (pl.madeCut ? parseInt(pl.score) || 0 : 0);
  }, 0);
}

/* ---- Render all ---- */
function renderAll() {
  renderMetrics();
  renderTeams();
  renderStandings();
  renderField();
  renderTeeTimes();
}

function renderMetrics() {
  const teams = TEAMS[currentT];
  const sorted = [...teams].sort((a, b) => teamEarnings(b) - teamEarnings(a));
  const leader = sorted[0];
  const allPicks = [...new Set(teams.flatMap(t => t.picks).filter(Boolean))];
  const active = allPicks.filter(p => getPlayer(p).madeCut).length;
  const totalEarned = teams.reduce((s, t) => s + teamEarnings(t), 0);
  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">Leading</div>
      <div class="metric-val">${leader.name}</div>
      <div class="metric-sub">${fmtMoney(teamEarnings(leader))}</div>
    </div>
    <div class="metric">
      <div class="metric-label">2nd place</div>
      <div class="metric-val">${sorted[1].name}</div>
      <div class="metric-sub">${fmtMoney(teamEarnings(sorted[1]))}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Golfers active</div>
      <div class="metric-val">${active}<span style="font-size:14px;color:#aaa"> / ${allPicks.length}</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">Total earned</div>
      <div class="metric-val">${fmtMoney(totalEarned)}</div>
    </div>
  `;
}

function renderTeams() {
  const teams = TEAMS[currentT];
  const sorted = [...teams]
    .map(t => ({ ...t, total: teamEarnings(t), score: teamScore(t) }))
    .sort((a, b) => b.total - a.total);

  document.getElementById('teams-grid').innerHTML = sorted.map((team, idx) => {
    const rc = RANK_COLORS[idx] || '#888';
    const rows = team.picks.filter(Boolean).map((p, i) => {
      const pl = getPlayer(p);
      const mc = !pl.madeCut;
      return `<div class="pick-row">
        <span class="pick-num">${i + 1}</span>
        <span class="pick-name${mc ? ' mc' : ''}">${p}</span>
        <span class="pick-pos">${pl.pos || 'TBD'}</span>
        <span class="pick-score ${scoreClass(pl.score)}">${pl.pos === 'TBD' ? '—' : fmtScore(pl.score)}</span>
        <span class="pick-earn">${pl.earnings ? fmtMoney(pl.earnings) : '—'}</span>
      </div>`;
    }).join('');

    return `<div class="card">
      <div class="card-head" style="background:${team.color}12;border-bottom:1px solid ${team.color}25">
        <div class="card-left">
          <div class="avatar" style="background:${team.color}22;color:${team.color}">${initials(team.name)}</div>
          <div>
            <div class="owner-name">${team.name}</div>
            <div class="owner-earn">${team.total ? fmtMoney(team.total) + ' earned' : 'No earnings yet'}</div>
          </div>
        </div>
        <div class="card-right">
          <div class="rank-badge" style="background:${rc}">${idx + 1}</div>
          <div class="team-total ${scoreClass(team.score)}">${fmtScore(team.score)}</div>
        </div>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function renderStandings() {
  const teams = TEAMS[currentT];
  const sorted = [...teams]
    .map(t => ({ ...t, total: teamEarnings(t), score: teamScore(t) }))
    .sort((a, b) => b.total - a.total);

  document.getElementById('standings-rows').innerHTML = sorted.map((t, i) => {
    const rc = RANK_COLORS[i] || '#888';
    return `<div class="lb-row standings-grid">
      <span><span class="rank-badge" style="background:${rc};color:#fff">${i + 1}</span></span>
      <span class="lb-name">${t.name}</span>
      <span style="font-size:12px;color:#888">${t.picks.filter(Boolean).join(', ')}</span>
      <span class="${scoreClass(t.score)}" style="font-weight:600">${fmtScore(t.score)}</span>
      <span style="font-weight:600;text-align:right">${fmtMoney(t.total)}</span>
    </div>`;
  }).join('');
}

function renderField() {
  const teams = TEAMS[currentT];
  const allPicks = [...new Set(teams.flatMap(t => t.picks).filter(Boolean))];
  const ownerMap = {};
  teams.forEach(t => t.picks.filter(Boolean).forEach(p => {
    ownerMap[p] = ownerMap[p] || [];
    ownerMap[p].push(t.name);
  }));

  if (dataMode !== 'scores') {
    document.getElementById('field-rows').innerHTML =
      '<div class="empty">Live scores not available yet — check back when the tournament begins.</div>';
    return;
  }

  const players = allPicks.map(p => getPlayer(p))
    .sort((a, b) => (parseInt(a.score) || 999) - (parseInt(b.score) || 999));

  document.getElementById('field-rows').innerHTML = players.map(pl => {
    const owners = (ownerMap[pl.name] || []).join(', ');
    return `<div class="lb-row field-grid">
      <span class="lb-pos">${pl.pos || '—'}</span>
      <span>
        <div class="lb-name">${pl.name}</div>
        <div class="lb-sub">${owners}</div>
      </span>
      <span class="ta-c" style="color:#888;font-size:12px">${pl.thru || '—'}</span>
      <span class="ta-c ${scoreClass(pl.today)}" style="font-weight:600">${fmtScore(pl.today)}</span>
      <span class="ta-r ${scoreClass(pl.score)}" style="font-weight:600">${fmtScore(pl.score)}</span>
      <span class="ta-r" style="font-size:12px;color:#888">${fmtMoney(pl.earnings)}</span>
    </div>`;
  }).join('');
}

function renderTeeTimes() {
  if (dataMode !== 'teetimes') {
    document.getElementById('tee-rows').innerHTML =
      '<div class="empty">Tee time data not currently loaded in your sheet.</div>';
    return;
  }
  const teams = TEAMS[currentT];
  const ownerMap = {};
  teams.forEach(t => t.picks.filter(Boolean).forEach(p => {
    ownerMap[p] = ownerMap[p] || [];
    ownerMap[p].push(t.name);
  }));
  const r0 = rawData[0] || {};
  const nameKey = Object.keys(r0).find(k => /PLAYER|GOLFER/i.test(k)) || Object.keys(r0)[1] || 'PLAYER';
  const timeKey = Object.keys(r0).find(k => /TEE|TIME/i.test(k));

  document.getElementById('tee-rows').innerHTML = rawData.map(r => {
    const name = String(r[nameKey] || '').trim();
    if (!name) return '';
    const time = timeKey ? fmtTime(r[timeKey]) : '—';
    const owners = ownerMap[name] || [];
    const isPicked = owners.length > 0;
    return `<div class="lb-row tee-grid${isPicked ? ' picked-row' : ''}">
      <span class="lb-name">${name}${isPicked ? `<span class="pick-tag">picked</span>` : ''}</span>
      <span style="color:#888;font-size:13px">${time}</span>
      <span style="font-size:12px;color:#1a5c2e;font-weight:${isPicked ? 500 : 400}">${owners.join(', ') || '—'}</span>
    </div>`;
  }).join('');
}

/* ---- Boot ---- */
setInterval(fetchData, 60000);
fetchData();
</script>
</body>
</html>
